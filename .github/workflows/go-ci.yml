name: Go CI

on:
  workflow_call:
    inputs:
      go-version:
        description: "Go version"
        required: true
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ inputs.go-version }}

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9.2.0
        with:
          args: --timeout 10m
          version: v2.10.1

  lint-imports:
    name: Lint Imports
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ inputs.go-version }}

      - name: install goimports-reviser
        run: go install -v github.com/incu6us/goimports-reviser/v3@latest

      - name: lint imports
        run: make lint-imports

  go_mod_tidy_check:
    name: Go Mod Tidy Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ inputs.go-version }}

      # Run go mod tidy for all modules
      - name: Run go mod tidy for all modules
        run: |
          find . -name 'go.mod' -execdir go mod tidy \;

      # Fail if go.mod/go.sum changed
      - name: Check for diff
        run: git diff --exit-code

  go_mod_parity_check:
    name: Go Mod Parity Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ inputs.go-version }}

      - name: Check go.mod parity between root and tastora
        run: ./scripts/check-go-mod-parity.sh

  unit_tests:
    name: Unit Tests
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-14]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6

      - name: Cache Go modules and build cache
        uses: actions/cache@v5
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: go-${{ runner.os }}-${{ hashFiles('**/go.sum') }}-${{ hashFiles('**/*.go') }}
          restore-keys: |
            go-${{ runner.os }}-${{ hashFiles('**/go.sum') }}-
            go-${{ runner.os }}-

      - name: set up go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ inputs.go-version }}
          cache: false

      - name: run unit tests
        run: make test-unit-fast ENABLE_VERBOSE=${{ runner.debug == '1' && 'true' || 'false' }}

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    env:
      OS: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Cache Go modules and build cache
        uses: actions/cache@v5
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: go-${{ runner.os }}-${{ hashFiles('**/go.sum') }}-${{ hashFiles('**/*.go') }}
          restore-keys: |
            go-${{ runner.os }}-${{ hashFiles('**/go.sum') }}-
            go-${{ runner.os }}-

      - name: set up go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ inputs.go-version }}
          cache: false

      - name: run unit tests with coverage
        run: make test-unit ENABLE_VERBOSE=${{ runner.debug == '1' && 'true' || 'false' }}

      - name: Upload unit test output
        uses: actions/upload-artifact@v7
        if: always() && runner.debug == '1'
        with:
          name: unit-test-output-ubuntu-latest
          path: |
            debug.log
            coverage.txt
          retention-days: 5

      - name: upload coverage
        uses: codecov/codecov-action@v5.5.2
        with:
          env_vars: OS
          token: ${{ secrets.CODECOV_TOKEN }}
          file: ./coverage.txt
          name: coverage-ubuntu-latest

  # @ramin - Temporarily removed while we figure out getting
  # these unit tests consistently running on ubuntu-latest
  # and then enabled for macos-latest. We aren't requiring
  # unit_race_test to pass for PRs so lets remove and reintroduce
  # once green
  #
  # unit_test_race:
  #   needs: [lint, go_mod_tidy_check]
  #   name: Unit Tests with Race Detector (ubuntu-latest)
  #   runs-on: ubuntu-latest

  #   steps:
  #     - uses: actions/checkout@v6

  #     - name: set up go
  #       uses: actions/setup-go@v6
  #       with:
  #         go-version: ${{ inputs.go-version }}

  #     - name: execute test run
  #       run: make test-unit-race ENABLE_VERBOSE=${{ runner.debug == '1' && 'true' || 'false' }}

  integration_test:
    name: Integration Tests
    needs: [go_mod_tidy_check, go_mod_parity_check, lint, lint-imports, unit_tests]
    uses: ./.github/workflows/integration-tests.yml
    with:
      go-version: ${{ inputs.go-version }}
